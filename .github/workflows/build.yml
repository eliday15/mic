name: Build MIC

# Compila los instaladores de MIC para que se puedan probar.
# - Windows: .msi + .exe (NSIS) — no se pueden compilar desde macOS, por eso van en CI.
# - macOS:   .dmg universal (Intel + Apple Silicon).
# Se dispara manualmente (Actions → Build MIC → Run workflow), al hacer push a main,
# o al publicar un tag v* (que además crea un Release con los instaladores adjuntos).

# Solo en tags v* o a mano: compilar en cada push a main quemaba ~150 min
# facturables por build (macOS cuesta 10x) y agotó la cuota del plan gratuito.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Necesario para que el paso de Release pueda crear/editar el release del tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nombre: windows
            args: ""
          - os: macos-latest
            nombre: macos
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.nombre == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Dependencias del frontend
        run: npm ci

      # Windows: comprueba que los binarios de mdbtools empaquetados arrancan
      # (con sus DLLs) y leen un .mdb real. Si falla, el build entero falla.
      - name: Probar mdbtools empaquetado (Windows)
        if: matrix.nombre == 'windows'
        run: cargo test -p mic-tauri --test migracion_mdbtools -- --nocapture

      - name: Compilar instaladores (tauri build)
        run: npm run tauri build -- ${{ matrix.args }}

      # Windows: prueba END-TO-END del instalador real — instala el NSIS en
      # silencio, verifica que mdbtools quedó junto a MIC.exe (la misma ruta
      # relativa que la app resuelve en runtime) y ejecuta el binario INSTALADO
      # contra un .mdb de verdad. Detecta lo que un test unitario no ve:
      # layout del instalador, DLLs faltantes, rutas mal resueltas.
      - name: Probar instalador NSIS instalado (Windows)
        if: matrix.nombre == 'windows'
        shell: pwsh
        run: |
          $setup = Get-ChildItem target/release/bundle/nsis/*.exe | Select-Object -First 1
          Write-Host "Instalando en silencio: $($setup.Name)"
          Start-Process -FilePath $setup.FullName -ArgumentList "/S" -Wait

          # Localiza el directorio instalado: registro de desinstalación o rutas
          # típicas. No se asume el nombre del binario principal (Tauri lo nombra
          # mic-tauri.exe salvo mainBinaryName); lo que valida este test es que
          # mdbtools quede en la subruta que la app resuelve en runtime.
          $candidatos = @()
          $reg = Get-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue |
                 Where-Object { $_.DisplayName -eq "MIC" } | Select-Object -First 1
          # OJO: el registro puede devolver InstallLocation ENTRE COMILLAS
          # ("C:\..."), que rompe Join-Path; se limpian antes de usar.
          if ($reg -and $reg.InstallLocation) { $candidatos += $reg.InstallLocation.Trim('"') }
          $candidatos += "$env:LOCALAPPDATA\Programs\MIC", "$env:LOCALAPPDATA\MIC", "$env:ProgramFiles\MIC"
          $instDir = $candidatos | Where-Object { $_ -and (Test-Path (Join-Path $_ "resources\mdbtools\win-x86\mdb-tables.exe")) } | Select-Object -First 1
          if (-not $instDir) {
            foreach ($c in ($candidatos | Select-Object -Unique)) {
              Write-Host "--- contenido de ${c}:"
              if (Test-Path $c) { Get-ChildItem -Recurse $c | Select-Object -ExpandProperty FullName | Write-Host }
              else { Write-Host "(no existe)" }
            }
            throw "mdbtools NO está en resources\mdbtools\win-x86 de ningún directorio instalado. Candidatos: $($candidatos -join '; ')"
          }
          Write-Host "Instalado en: $instDir"
          $mdb = Join-Path $instDir "resources\mdbtools\win-x86\mdb-tables.exe"

          # Y deben FUNCIONAR desde ahí (DLLs incluidas) leyendo un Access real.
          $salida = & $mdb -1 "crates\mic-migrator\tests\fixtures\test.mdb"
          if ($LASTEXITCODE -ne 0) { throw "mdb-tables instalado falló con código $LASTEXITCODE" }
          if ($salida -notcontains "Table1") { throw "mdb-tables instalado no listó Table1; salida: $salida" }
          Write-Host "OK: mdbtools instalado funciona — tablas: $($salida -join ', ')"

      # Windows: .msi (WiX) y .exe (NSIS)
      - name: Subir instaladores de Windows
        if: matrix.nombre == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: MIC-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # macOS: .dmg universal
      - name: Subir instalador de macOS
        if: matrix.nombre == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: MIC-macos
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Si es un tag v*, adjunta los instaladores de cada plataforma al Release.
      - name: Publicar instaladores de Windows en el Release
        if: matrix.nombre == 'windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

      - name: Publicar instalador de macOS en el Release
        if: matrix.nombre == 'macos' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/universal-apple-darwin/release/bundle/dmg/*.dmg
