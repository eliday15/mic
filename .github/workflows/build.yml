name: Build MIC

# Compila los instaladores de MIC para que se puedan probar.
# - Windows: .msi + .exe (NSIS) — no se pueden compilar desde macOS, por eso van en CI.
# - macOS:   .dmg universal (Intel + Apple Silicon).
# Se dispara manualmente (Actions → Build MIC → Run workflow), al hacer push a main,
# o al publicar un tag v* (que además crea un Release con los instaladores adjuntos).

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

# Necesario para que el paso de Release pueda crear/editar el release del tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nombre: windows
            args: ""
          - os: macos-latest
            nombre: macos
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.nombre == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Dependencias del frontend
        run: npm ci

      # Windows: comprueba que los binarios de mdbtools empaquetados arrancan
      # (con sus DLLs) y leen un .mdb real. Si falla, el build entero falla.
      - name: Probar mdbtools empaquetado (Windows)
        if: matrix.nombre == 'windows'
        run: cargo test -p mic-tauri --test migracion_mdbtools -- --nocapture

      - name: Compilar instaladores (tauri build)
        run: npm run tauri build -- ${{ matrix.args }}

      # Windows: .msi (WiX) y .exe (NSIS)
      - name: Subir instaladores de Windows
        if: matrix.nombre == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: MIC-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # macOS: .dmg universal
      - name: Subir instalador de macOS
        if: matrix.nombre == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: MIC-macos
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Si es un tag v*, adjunta los instaladores de cada plataforma al Release.
      - name: Publicar instaladores de Windows en el Release
        if: matrix.nombre == 'windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

      - name: Publicar instalador de macOS en el Release
        if: matrix.nombre == 'macos' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/universal-apple-darwin/release/bundle/dmg/*.dmg
