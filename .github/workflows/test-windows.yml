name: Test migración Windows

# Prueba SOLO la migración de Access en un Windows real (rápido, sin compilar
# instaladores). Para iterar sobre el bug de importación sin esperar el build
# completo: Actions → "Test migración Windows" → Run workflow.
on: workflow_dispatch

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Migra un álbum con el esquema exacto del MIC clásico y además ejecuta
      # el arnés mic-inspect con bitácora visible.
      - name: Tests del migrador (esquema MIC real)
        run: cargo test -p mic-migrator -- --nocapture

      - name: Arnés mic-inspect sobre el álbum MIC (bitácora incluida)
        shell: pwsh
        run: |
          cargo run -p mic-migrator --bin mic-inspect -- `
            crates/mic-migrator/tests/fixtures/album-mic.mdb --migrar $env:TEMP\album.micdb

      # El MIC clásico crea sus álbumes en formato Jet 3.0 (dbVersion30 del
      # VB6, frmnewp.frm:240). Aquí se fabrica uno IGUAL con el motor Jet real
      # de Microsoft (msjet40, componente de Windows, solo 32 bits) y se pasa
      # por el migrador. Si jetdb tropieza con Jet3+acentos, aquí se ve.
      - name: Crear álbum Jet 3.x con el motor Jet real (32-bit)
        shell: pwsh
        run: |
          & "C:\Windows\SysWOW64\WindowsPowerShell\v1.0\powershell.exe" `
            -ExecutionPolicy Bypass -File scripts/crear-jet3.ps1

      - name: Arnés mic-inspect sobre el álbum Jet 3.x
        shell: pwsh
        run: |
          cargo run -p mic-migrator --bin mic-inspect -- `
            mic-jet3.mdb --migrar $env:TEMP\album-jet3.micdb

      # El álbum Jet3 fabricado se sube como artifact para poder probarlo
      # también en Mac y convertirlo en fixture permanente.
      - name: Subir álbum Jet 3.x
        uses: actions/upload-artifact@v4
        with:
          name: mic-jet3
          path: mic-jet3.mdb
